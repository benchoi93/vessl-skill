name: claude-workspace
description: Interactive GPU workspace with Claude Code pre-configured
tags:
  - claude-code
  - workspace

resources:
  cluster: umn-choilab-cluster
  preset: rtx-6000-1-30cpu-100gbram

image: quay.io/vessl-ai/torch:2.3.1-cuda12.1

env:
  CLAUDE_OAUTH_CREDENTIALS:
    secret: true
  GITHUB_TOKEN:
    secret: true
  CROSSREF_EMAIL:
    value: "chois@umn.edu"

import:
  /root/code: git://github.com/<org>/<repo>

interactive:
  max_runtime: 24h
  jupyter:
    idle_timeout: 120m

ports:
  - name: jupyter
    type: http
    port: 8888
  - name: tensorboard
    type: http
    port: 6006

run:
  - command: |
      git clone https://${GITHUB_TOKEN}@github.com/benchoi93/dot-claude.git ~/.claude
      bash ~/.claude/setup-claude.sh
